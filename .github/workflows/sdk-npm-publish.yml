name: SDK Publish to npm

on:
  push:
    tags:
      - "sdk-npm/v*"   # 例: sdk-npm/v0.2.0 をプッシュしたときに発火

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # npm Trusted Publishing + provenance 用 (OIDC)

    defaults:
      run:
        working-directory: sdk-npm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: sdk-npm/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Trusted Publisher を npmjs.com で事前設定済みなので NODE_AUTH_TOKEN 不要。
      # OIDC トークンを使って短命の発行トークンを自動取得する。
      - name: Publish to npm
        run: npm publish --access public --provenance
